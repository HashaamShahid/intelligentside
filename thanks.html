<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thank You — IntelligentSide</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
      }

      .thanks-box {
        width: min(90%, 720px);
        padding: 40px;
        border-radius: 28px;
        text-align: center;
        background: linear-gradient(
          180deg,
          rgba(255,255,255,0.08),
          rgba(255,255,255,0.035)
        );
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(18px);
      }

      .thanks-box h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 4vw, 3.5rem);
        letter-spacing: -0.04em;
      }

      .thanks-box p {
        color: #99aac4;
        line-height: 1.7;
        margin-bottom: 24px;
      }

      .thanks-box a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 14px 22px;
        border-radius: 999px;
        font-weight: 700;
        text-decoration: none;
        color: white;
        background: linear-gradient(135deg, #61d0ff, #8e7dff);
        box-shadow: 0 15px 40px rgba(61, 129, 255, 0.28);
      }
    </style>
  </head>
  <body>
    <div class="thanks-box">
      <h1>Request received.</h1>
      <p>
        Your form was submitted successfully. We’ll review your details and get
        back to you soon.
      </p>
      <a href="/">Return to homepage</a>
    </div>
  </body>
</html>
